# Optional production-style smoke test for the FastAPI backend.
#
# For local development, prefer the supported path: `supabase start` (Auth +
# Postgres + Storage + Studio in Docker) plus `uv run uvicorn` for the backend
# and `npm run dev` for the frontend. See docs/local-development.md.
#
# This file builds a single `web` container that serves the FastAPI backend and
# the built frontend on :8000. It expects a Supabase stack already running on
# the host (the CLI defaults: API 55321, DB 55322).

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      REPOSITORY_TYPE: postgres
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:55322/postgres
      SUPABASE_URL: http://host.docker.internal:55321
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SEED_DEMO_DATA: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
