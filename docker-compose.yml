services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: thabetha
      POSTGRES_PASSWORD: thabetha_local
      POSTGRES_DB: thabetha
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-gotrue.sql:/docker-entrypoint-initdb.d/001_gotrue_bootstrap.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thabetha"]
      interval: 2s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://supabase_auth_admin:thabetha_local@db:5432/thabetha?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:8000
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_JWT_SECRET: super-secret-jwt-token-for-local-dev-min-32-chars!!
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      GOTRUE_DISABLE_SIGNUP: "false"
      API_EXTERNAL_URL: http://localhost:9999
      GOTRUE_API_HOST: 0.0.0.0
      PORT: "9999"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://thabetha:thabetha_local@db:5432/thabetha
      SUPABASE_JWT_SECRET: super-secret-jwt-token-for-local-dev-min-32-chars!!
      GOTRUE_URL: http://auth:9999
      REPOSITORY_TYPE: postgres
      SEED_DEMO_DATA: "false"

volumes:
  pgdata:
